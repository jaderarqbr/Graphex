<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Creative Grafex Design — v3 (test)</title>
<style>
:root{--bg:#fafafa;--pane:#f0f2f5;--muted:#666}
html,body{height:100vh;margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg); display:flex; flex-direction:column}
#toolbar{display:flex;gap:8px;padding:8px;background:var(--pane);border-bottom:1px solid #ddd;align-items:center;flex-wrap:wrap;flex-shrink:0}
button,select,input[type=color],input[type=number]{padding:6px 8px;border-radius:6px;border:1px solid #cfcfcf;background:white;cursor:pointer}
#main{display:flex;flex:1;justify-content:space-between;overflow:hidden}
#sidebarLeft{width:220px;padding:10px;background:#f7f7f9;border-right:1px solid #e0e0e0;overflow:auto;flex-shrink:0}
#blocks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.block{width:48px;height:48px;object-fit:contain;border-radius:6px;border:1px solid #ddd;cursor:grab;background:transparent}
#sidebarRight{width:220px;padding:10px;background:#f7f7f9;border-left:1px solid #e0e0e0;overflow:auto;flex-shrink:0}
.layer-item{display:flex;align-items:center;padding:6px;margin-bottom:4px;background:white;border:1px solid #ddd;border-radius:4px;font-size:13px;user-select:none;cursor:pointer;position:relative;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.layer-active{border:2px solid #2580ff;box-shadow:0 0 6px rgba(37,128,255,0.6)}
.layer-name{flex-grow:1;margin-left:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.opacity-slider-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:-4px;padding:0 6px}
.canvasLayer{position:relative;transition:transform 0.2s;transform-origin:top left}
canvas{display:block;border:1px solid #ccc;box-shadow:0 6px 20px rgba(0,0,0,0.06)}
#overlayCanvas{position:absolute;left:0;top:0;pointer-events:auto}
#statusBar{height:34px;padding:6px 10px;border-top:1px solid #ddd;background:#fafafa;font-size:13px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.small{font-size:12px;color:var(--muted)}
.toast{position:fixed;right:18px;bottom:18px;background:rgba(20,20,20,0.9);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;z-index:9999}
.floatingTextInput{position:absolute;display:none;z-index:2000}
.floatingTextInput textarea{min-width:200px;min-height:60px;padding:8px;border-radius:6px;border:1px solid #ccc;resize:vertical}
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('pencil')">✏️ Lápis</button>
  <button onclick="setTool('line')">📏 Linha</button>

  <label class="small">Arco</label>
  <select id="arcMode" onchange="setTool('arc')">
    <option value="pleno">Pleno (centro+raio)</option>
    <option value="3pts">3 Pontos</option>
  </select>
  <button onclick="setTool('polyline')">🔗 Polilinha</button>

  <button onclick="setTool('measure')">📐 Cota</button>
  <button onclick="setTool('selectRect')">▭ Seleção</button>
  <button onclick="copySelection()">📋 Copiar</button>
  <button onclick="cutSelection()">✂️ Recortar</button>
  <button onclick="pasteSelection()">📎 Colar</button>

  <div style="flex:1"></div>

  <label class="small">Cor</label><input id="colorPicker" type="color" value="#000000">
  <label class="small">Espess.</label><input id="lineWidth" type="number" min="1" value="2" style="width:72px">
  <label class="small">Esc (cm/px)</label><input id="scaleInput" type="number" min="0.01" step="0.01" value="1" style="width:72px">
  <button onclick="undo()">↶Desfazer</button>
  <button onclick="redo()">↷Refazer</button>
</div>

<div id="main">
  <div id="sidebarLeft">
    <strong>Blocos (arraste p/ canvas)</strong>
    <div id="blocks"></div>
    <hr/>
    <strong>Controles</strong><br/>
    <button onclick="exportPNG()">🌄 Export PNG</button>
    <button onclick="openCanvasSizeModal()">🔧 Redimensionar</button>
    <button onclick="clearCanvas()">🧹 Limpar Tudo</button>
    <button onclick="toggleGrid()">🔳 Grade ON/OFF</button>
  </div>

  <div id="canvasWrap" style="flex:1;display:flex;align-items:flex-start;justify-content:flex-start;padding:20px;overflow:auto;background:#fff">
    <div class="canvasLayer" id="canvasLayer">
      <canvas id="mainCanvas" width="1400" height="900"></canvas>
      <canvas id="overlayCanvas" width="1400" height="900"></canvas>
    </div>
  </div>

  <div id="sidebarRight">
    <strong>Gerenciar Camadas</strong>
    <div id="layersList"></div>
    <hr/>
    <button onclick="mergeToNewLayer()" style="background:#5cb85c;color:white">📸 Printscreen (Merge)</button>
    <button onclick="addNewLayer()">➕ Nova Camada Bitmap</button>
  </div>
</div>

<div id="statusBar">
  Ferramenta: <strong id="currentTool">pencil</strong>
  <span id="canvasSizeStatus" class="small" style="margin-left:12px">W:1400 H:900 px</span>
  <div style="flex:1"></div>
  <div id="coords" class="small">x:0 y:0</div>
</div>

<div id="modalOverlay" style="display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:999"></div>
<div id="newCanvasSizeModal" style="display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:8px;z-index:1000">
  <strong>Definir Novo Tamanho do Canvas</strong>
  <div style="margin-top:10px">Largura: <input id="newWidthInput" type="number" value="1400" style="width:80px"/> Altura: <input id="newHeightInput" type="number" value="900" style="width:80px"/></div>
  <div style="text-align:right;margin-top:12px"><button onclick="commitNewCanvasSize(null,null,false)" style="background:#4CAF50;color:white">OK</button> <button onclick="cancelNewCanvasSize()">Cancelar</button></div>
</div>

<script>
/* ============================================
   Core elements, state and helper functions
   ============================================ */
const displayCanvas = document.getElementById('mainCanvas');
const displayCtx = displayCanvas.getContext('2d', {alpha:true});
const overlayCanvas = document.getElementById('overlayCanvas');
const overlayCtx = overlayCanvas.getContext('2d', {alpha:true});

const colorPicker = document.getElementById('colorPicker');
const lineWidthInput = document.getElementById('lineWidth');
const scaleInput = document.getElementById('scaleInput');
const currentToolSpan = document.getElementById('currentTool');

const canvasLayerEl = document.getElementById('canvasLayer');

let currentTool = 'pencil';
let drawing = false;
let startX=0, startY=0;
let lastMouse = {x:0,y:0};
let undoStack = [], redoStack = [], MAX_UNDO=20;
let selectionRect = null;
let copiedImageData = null;
let pastePreview = null;
let objects = [];
let selectedObject = null;
let isDraggingSelection = false, selectionOffset={x:0,y:0};
let isRotating=false, isResizing=false, activeHandle=null;
let isGridVisible=false, GRID_SIZE=50;
let currentZoom = 100;
let polylinePoints = null;
let arcTemp = []; // for arc 3pts mode

/* Layers simplified */
let layers = [];
let activeLayerId = null;

/* Init */
displayCanvas.width = 1400; displayCanvas.height = 900;
overlayCanvas.width = 1400; overlayCanvas.height = 900;

function showToast(msg, t=1200){ const el=document.createElement('div'); el.className='toast'; el.innerText=msg; document.body.appendChild(el); setTimeout(()=>el.remove(), t); }
function setTool(tool){ currentTool = tool; currentToolSpan.innerText = tool; if (tool!=='polyline') polylinePoints = null; if (tool!=='arc') arcTemp = []; }

/* Basic layer functions (lightweight) */
function addNewLayer(){
  const newCanvas = document.createElement('canvas');
  newCanvas.width = displayCanvas.width; newCanvas.height = displayCanvas.height;
  const ctx = newCanvas.getContext('2d', {alpha:true});
  const layer = { id: Date.now(), name: 'Bitmap ' + (layers.length+1), type:'bitmap', canvas:newCanvas, ctx:ctx, isVisible:true, opacity:100};
  layers.push(layer);
  activeLayerId = layer.id;
  updateLayersListUI();
  redrawAll();
}
function getActiveLayer(){ return layers.find(l=>l.id===activeLayerId); }
function getActiveContext(){ const l=getActiveLayer(); return l && l.type==='bitmap' ? l.ctx : null; }
function setupInitialLayers(){ layers=[]; layers.push({id:'objects-layer',name:'Objetos/Blocos',type:'object',objects:objects,isVisible:true,opacity:100}); addNewLayer(); updateLayersListUI(); pushUndo(); }
setupInitialLayers();

function updateLayersListUI(){
  const el=document.getElementById('layersList'); el.innerHTML='';
  layers.slice().reverse().forEach(layer=>{
    const item=document.createElement('div'); item.className='layer-item'+(layer.id===activeLayerId?' layer-active':'');
    item.onclick=()=>{ activeLayerId=layer.id; updateLayersListUI(); redrawAll(); showToast('Camada ativa: '+layer.name); };
    const vis=document.createElement('input'); vis.type='checkbox'; vis.checked = layer.isVisible; vis.onchange=(e)=>{ layer.isVisible = e.target.checked; redrawAll(); };
    item.appendChild(vis);
    const name=document.createElement('span'); name.className='layer-name'; name.innerText = layer.name; item.appendChild(name);
    el.appendChild(item);
  });
}

/* Undo/Redo - save minimal state (bit heavy but limited) */
function saveLayerState(){
  const state={w:displayCanvas.width,h:displayCanvas.height, activeLayerId:activeLayerId, layers:layers.map(layer=>{
    const s={id:layer.id,name:layer.name,type:layer.type,isVisible:layer.isVisible,opacity:layer.opacity};
    if (layer.type==='bitmap') s.dataURL = layer.canvas.toDataURL();
    else if (layer.type==='object') s.objects = JSON.parse(JSON.stringify(layer.objects.map(o=> ({...o, img_src: o.img ? o.img.src : undefined}))));
    return s;
  })};
  return JSON.stringify(state);
}
function loadLayerState(stateJSON){
  try{
    const state = JSON.parse(stateJSON);
    displayCanvas.width = state.w; displayCanvas.height = state.h;
    overlayCanvas.width = state.w; overlayCanvas.height = state.h;
    const newLayers=[];
    const proms = state.layers.map(ls=>{
      const layer = { id: ls.id, name: ls.name, type: ls.type, isVisible: ls.isVisible, opacity: ls.opacity};
      if (ls.type==='bitmap'){
        const c = document.createElement('canvas'); c.width = state.w; c.height = state.h;
        const ctx = c.getContext('2d',{alpha:true});
        layer.canvas = c; layer.ctx = ctx;
        return new Promise(resolve=>{
          if (ls.dataURL){
            const img = new Image();
            img.onload = ()=>{ ctx.drawImage(img,0,0); newLayers.push(layer); resolve(); };
            img.onerror = ()=>{ newLayers.push(layer); resolve(); };
            img.src = ls.dataURL;
          } else { newLayers.push(layer); resolve(); }
        });
      } else if (ls.type==='object'){
        layer.objects = [];
        newLayers.push(layer);
        return Promise.resolve();
      }
    });
    Promise.all(proms).then(()=>{ layers = newLayers; activeLayerId = state.activeLayerId || (layers.find(l=>l.type==='bitmap')&&layers.find(l=>l.type==='bitmap').id); updateLayersListUI(); redrawAll(); showToast('Estado restaurado'); });
  }catch(e){ console.warn('loadLayerState fail', e); }
}
function pushUndo(){ try{ undoStack.push(saveLayerState()); if (undoStack.length>MAX_UNDO) undoStack.shift(); redoStack.length=0; } catch(e){console.warn(e);} }
function undo(){ if (undoStack.length<2){ showToast('Nada a desfazer'); return; } const cur = undoStack.pop(); redoStack.push(cur); loadLayerState(undoStack[undoStack.length-1]); }
function redo(){ if (!redoStack.length){ showToast('Nada a refazer'); return; } const s = redoStack.pop(); undoStack.push(s); loadLayerState(s); }

/* Redraw all layers into displayCanvas */
function redrawAll(){
  displayCtx.clearRect(0,0,displayCanvas.width, displayCanvas.height);
  layers.forEach(layer=>{
    if (!layer.isVisible) return;
    displayCtx.globalAlpha = (layer.opacity||100)/100;
    if (layer.type==='bitmap') displayCtx.drawImage(layer.canvas,0,0);
    else if (layer.type==='object') layer.objects.forEach(o=> drawObject(displayCtx,o));
  });
  displayCtx.globalAlpha = 1;
  clearOverlay();
  if (isGridVisible) drawGrid(overlayCtx);
  if (selectionRect) drawOverlaySelection(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
}
function drawObject(ctx,o){ if (!o.img) return; ctx.save(); ctx.translate(o.x+o.w/2,o.y+o.h/2); if (o.mirror) ctx.scale(-1,1); ctx.rotate(o.rot*Math.PI/180); ctx.drawImage(o.img,-o.w/2,-o.h/2,o.w,o.h); ctx.restore(); }

/* ============================================
   Grid & overlays
   ============================================ */
function drawGrid(ctx){
  ctx.save();
  ctx.strokeStyle = '#e6f0ff';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let x=0;x<displayCanvas.width;x+=GRID_SIZE){ ctx.moveTo(x,0); ctx.lineTo(x,displayCanvas.height); }
  for (let y=0;y<displayCanvas.height;y+=GRID_SIZE){ ctx.moveTo(0,y); ctx.lineTo(displayCanvas.width,y); }
  ctx.stroke();
  ctx.restore();
}
function clearOverlay(){ overlayCtx.clearRect(0,0,overlayCanvas.width, overlayCanvas.height); }

/* ============================================
   Snap ortogonal (Shift) - === ADIÇÃO ===
   ============================================ */
function snapOrthogonal(x1,y1,x2,y2, ev){
  if (!ev || !ev.shiftKey) return {x:x2,y:y2};
  const dx = x2 - x1, dy = y2 - y1;
  if (Math.abs(dx) > Math.abs(dy)) return {x:x2, y:y1}; // horizontal
  return {x:x1, y:y2}; // vertical
}

/* ============================================
   Selection handles (for selectionRect) - === ADIÇÃO ===
   ============================================ */
function drawOverlaySelection(x,y,w,h){
  overlayCtx.save();
  overlayCtx.strokeStyle = 'rgba(37,128,255,0.95)';
  overlayCtx.lineWidth = 1.5;
  overlayCtx.setLineDash([6,3]);
  overlayCtx.strokeRect(x,y,w,h);
  overlayCtx.fillStyle = 'rgba(37,128,255,0.06)';
  overlayCtx.fillRect(x,y,w,h);

  // handles
  const s = 8;
  const handles = [
    {type:'resize-tl', x:x, y:y},
    {type:'resize-tr', x:x+w, y:y},
    {type:'resize-br', x:x+w, y:y+h},
    {type:'resize-bl', x:x, y:y+h},
  ];
  overlayCtx.fillStyle = '#2580ff';
  handles.forEach(hd => overlayCtx.fillRect(hd.x - s/2, hd.y - s/2, s, s));

  // rotate handle (orange) above
  const rotX = x + w/2, rotY = y - 28;
  overlayCtx.beginPath(); overlayCtx.arc(rotX, rotY, 7, 0, Math.PI*2); overlayCtx.fillStyle = '#ff8a00'; overlayCtx.fill();
  overlayCtx.restore();
}
function hitTestSelectionHandles(sel, x, y){
  if (!sel) return null;
  const s = 10;
  const corners = [
    {type:'resize-tl', x:sel.x, y:sel.y},
    {type:'resize-tr', x:sel.x+sel.w, y:sel.y},
    {type:'resize-br', x:sel.x+sel.w, y:sel.y+sel.h},
    {type:'resize-bl', x:sel.x, y:sel.y+sel.h},
    {type:'rotate', x:sel.x+sel.w/2, y:sel.y-28}
  ];
  for (let h of corners){
    if (Math.abs(x-h.x)<=s && Math.abs(y-h.y)<=s) return h;
  }
  return null;
}

/* ============================================
   Flood fill (simplificado) and selection copy/paste
   ============================================ */
function runFloodFill(startX,startY, fillColorHex){
  const ctx = getActiveContext();
  if (!ctx) { showToast('Selecione camada bitmap'); return false; }
  // Lightweight fill: fillRect single pixel region flood (not perfect but functional)
  // Keep existing implementation idea to avoid heavy loops here (omitted for brevity)
  ctx.fillStyle = fillColorHex; ctx.fillRect(startX,startY,1,1); return true;
}

function copySelection(){
  if (!selectionRect) { showToast('Nada selecionado'); return; }
  const ctx = getActiveContext();
  try{
    copiedImageData = ctx.getImageData(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
    showToast('Área copiada');
  }catch(e){ console.warn(e); showToast('Erro ao copiar'); }
}
function cutSelection(){ copySelection(); const ctx = getActiveContext(); if (!ctx || !selectionRect) return; ctx.clearRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h); selectionRect=null; redrawAll(); pushUndo(); showToast('Área recortada'); }
function pasteSelection(){ if (!copiedImageData){ showToast('Nada para colar'); return; } pastePreview = {type:'raster', imageData: copiedImageData, w: copiedImageData.width, h: copiedImageData.height}; showToast('Posicione e clique para colar'); }

/* finalize paste */
function finalizePasteAt(x,y){
  const ctx = getActiveContext();
  if (!ctx || !pastePreview) { showToast('Camada inválida'); pastePreview=null; return; }
  const px = Math.max(0, Math.min(displayCanvas.width - pastePreview.w, Math.round(x - pastePreview.w/2)));
  const py = Math.max(0, Math.min(displayCanvas.height - pastePreview.h, Math.round(y - pastePreview.h/2)));
  ctx.putImageData(pastePreview.imageData, px, py);
  pushUndo(); pastePreview=null; redrawAll(); showToast('Colado');
}

/* ============================================
   Drawing helpers: measurements, polylines, arcs - === ADIÇÕES ===
   ============================================ */

function drawMeasurement(ctx, x1, y1, x2, y2, options = {}){
  // options: {isArc:bool, arcCenter:{x,y}, arcRadius, arcAngle}
  ctx.save();
  ctx.strokeStyle = colorPicker.value; ctx.fillStyle=colorPicker.value; ctx.lineWidth = Math.max(1, parseInt(lineWidthInput.value||2));
  if (options.isArc){
    // Draw arc and annotate length
    const c = options.arcCenter;
    const r = options.arcRadius;
    const startAng = options.startAngle;
    const endAng = options.endAngle;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, startAng, endAng); ctx.stroke();
    // arc length
    const delta = Math.abs(endAng - startAng);
    const length = r * delta;
    const midAng = (startAng + endAng)/2;
    const tx = c.x + Math.cos(midAng) * (r + 16);
    const ty = c.y + Math.sin(midAng) * (r + 16);
    ctx.font = '14px Arial'; ctx.fillText(`${Math.round(length)} px`, tx, ty);
  } else {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // annotate delta and angle
    const dx = x2-x1, dy = y2-y1;
    const ang = Math.atan2(dy,dx)*180/Math.PI;
    const dist = Math.hypot(dx,dy) * parseFloat(scaleInput.value || 1);
    ctx.font = '13px Arial';
    ctx.fillText(`${Math.round(dist)} px • ${Math.round(ang)}°`, (x1+x2)/2 + 6, (y1+y2)/2 - 6);
  }
  ctx.restore();
}

/* Arc drawing utilities */
function drawPreviewArcOverlay(cx,cy,r,startAngle,endAngle){
  clearOverlay();
  overlayCtx.save();
  overlayCtx.beginPath();
  overlayCtx.arc(cx,cy,r,startAngle,endAngle);
  overlayCtx.strokeStyle = colorPicker.value; overlayCtx.lineWidth = Math.max(1, parseInt(lineWidthInput.value||2)); overlayCtx.stroke();
  overlayCtx.restore();
}

/* ============================================
   Pointer events (core drawing loop) - adapted for additions
   ============================================ */
let pointerDown=false;
overlayCanvas.addEventListener('pointerdown',(ev)=>{
  overlayCanvas.setPointerCapture(ev.pointerId);
  pointerDown=true;
  const rect = overlayCanvas.getBoundingClientRect();
  const scale = currentZoom/100;
  const x = Math.round((ev.clientX - rect.left)/scale);
  const y = Math.round((ev.clientY - rect.top)/scale);
  startX = x; startY = y; lastMouse = {x,y};

  // Paste handling
  if (pastePreview){ finalizePasteAt(x,y); return; }

  // Selection handle detection - === ADIÇÃO ===
  if (selectionRect){
    const h = hitTestSelectionHandles(selectionRect, x, y);
    if (h){
      activeHandle = h;
      if (h.type.startsWith('resize')) isResizing = true;
      if (h.type === 'rotate') isRotating = true;
      return;
    }
  }

  // start shape based on tool
  if (currentTool === 'fill'){
    const ok = runFloodFill(x,y, colorPicker.value);
    if (ok){ pushUndo(); redrawAll(); showToast('Preenchido'); } else showToast('Nada preenchido');
    pointerDown=false; return;
  }

  if (currentTool === 'text'){ /* not implemented here */ pointerDown=false; return; }

  if (currentTool === 'selectRect'){
    selectionRect = null;
    clearOverlay();
    return;
  }

  if (currentTool === 'polyline'){
    if (!polylinePoints) polylinePoints = [{x,y}];
    else polylinePoints.push({x,y});
    // draw small dot and lines
    clearOverlay();
    overlayCtx.save(); overlayCtx.fillStyle = colorPicker.value; overlayCtx.beginPath();
    overlayCtx.arc(x,y,3,0,Math.PI*2); overlayCtx.fill();
    overlayCtx.beginPath(); overlayCtx.moveTo(polylinePoints[0].x,polylinePoints[0].y);
    for(let i=1;i<polylinePoints.length;i++) overlayCtx.lineTo(polylinePoints[i].x, polylinePoints[i].y);
    overlayCtx.strokeStyle = colorPicker.value; overlayCtx.lineWidth = Math.max(1,parseInt(lineWidthInput.value||2)); overlayCtx.stroke();
    overlayCtx.restore();
    return;
  }

  if (currentTool === 'arc'){
    const mode = document.getElementById('arcMode').value;
    if (mode === 'pleno'){
      // start center selection or center set
      arcTemp = [{cx:x, cy:y}]; showToast('Centro definido. Arraste para definir raio ou clique em outro ponto.');
      return;
    } else if (mode === '3pts'){
      // collect 3 points via clicks
      arcTemp.push({x,y});
      if (arcTemp.length === 3){
        // compute circle through 3 points
        const A = arcTemp[0], B = arcTemp[1], C = arcTemp[2];
        const circle = circleThrough3Points(A,B,C);
        if (!circle){ showToast('Pontos colineares. Redefina.'); arcTemp=[]; return; }
        // draw arc from A->B->C (choose start and end)
        const startAng = Math.atan2(A.y - circle.cy, A.x - circle.cx);
        const midAng = Math.atan2(B.y - circle.cy, B.x - circle.cx);
        const endAng = Math.atan2(C.y - circle.cy, C.x - circle.cx);
        // choose smallest arc passing through the three in order - we'll compute sign
        // Simplify: get arc between startAng and endAng that passes near midAng
        let s = startAng, e = endAng;
        // normalize
        while (e < s) e += Math.PI*2;
        let mid = midAng; while (mid < s) mid += Math.PI*2;
        if (!(mid > s && mid < e)) { // try reversed
          e = startAng; s = endAng;
          while (e < s) e += Math.PI*2;
        }
        // Draw into active ctx
        const act = getActiveContext();
        if (act){ drawMeasurement(act,0,0,0,0,{isArc:true,arcCenter:{x:circle.cx,y:circle.cy},arcRadius:circle.r,startAngle:s,endAngle:e}); pushUndo(); redrawAll(); showToast('Arco desenhado (3pts)'); }
        arcTemp = [];
      } else {
        showToast(`Ponto ${arcTemp.length}/3 marcado`);
      }
      return;
    }
  }

  // normal drawing starts - mark start, pointermove will preview
});

overlayCanvas.addEventListener('pointermove', (ev)=>{
  const rect = overlayCanvas.getBoundingClientRect();
  const scale = currentZoom/100;
  const x = Math.round((ev.clientX - rect.left)/scale);
  const y = Math.round((ev.clientY - rect.top)/scale);
  lastMouse = {x,y};
  document.getElementById('coords').innerText = `x:${x} y:${y}`;

  if (!pointerDown){
    clearOverlay();
    if (isGridVisible) drawGrid(overlayCtx);
    // show selection overlay if exists
    if (selectionRect) drawOverlaySelection(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
    // polylines preview
    if (polylinePoints && polylinePoints.length){
      overlayCtx.save(); overlayCtx.beginPath(); overlayCtx.moveTo(polylinePoints[0].x, polylinePoints[0].y);
      for(let i=1;i<polylinePoints.length;i++) overlayCtx.lineTo(polylinePoints[i].x, polylinePoints[i].y);
      overlayCtx.lineTo(x,y); overlayCtx.strokeStyle=colorPicker.value; overlayCtx.lineWidth=2; overlayCtx.stroke(); overlayCtx.restore();
    }
    return;
  }

  // If transforming selection
  if (selectionRect && (isResizing || isRotating) && activeHandle){
    if (isRotating && activeHandle.type === 'rotate'){
      const cx = selectionRect.x + selectionRect.w/2, cy = selectionRect.y + selectionRect.h/2;
      const angle = Math.atan2(y - cy, x - cx) * 180 / Math.PI;
      selectionRect._angle = angle;
      clearOverlay(); drawOverlaySelection(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
      // draw rotation marker
      return;
    }
    if (isResizing && activeHandle.type.startsWith('resize')){
      // compute new box
      let newX = selectionRect.x, newY = selectionRect.y, newW = selectionRect.w, newH = selectionRect.h;
      switch(activeHandle.type){
        case 'resize-tl':
          newW += (selectionRect.x - x); newH += (selectionRect.y - y); newX = x; newY = y; break;
        case 'resize-tr':
          newW = x - selectionRect.x; newH += (selectionRect.y - y); newY = y; break;
        case 'resize-br':
          newW = x - selectionRect.x; newH = y - selectionRect.y; break;
        case 'resize-bl':
          newW += (selectionRect.x - x); newH = y - selectionRect.y; newX = x; break;
      }
      selectionRect = {x:newX,y:newY,w:Math.max(6,newW),h:Math.max(6,newH)};
      clearOverlay(); drawOverlaySelection(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
      return;
    }
  }

  // Drawing previews for tools
  if (currentTool === 'line' || currentTool === 'measure'){
    // snap orthogonal if shift
    const p = snapOrthogonal(startX,startY,x,y,ev);
    clearOverlay(); if (isGridVisible) drawGrid(overlayCtx);
    overlayCtx.save(); overlayCtx.strokeStyle = colorPicker.value; overlayCtx.lineWidth = Math.max(1,parseInt(lineWidthInput.value||2));
    overlayCtx.beginPath(); overlayCtx.moveTo(startX,startY); overlayCtx.lineTo(p.x,p.y); overlayCtx.stroke();
    // show measurement preview text
    const dx = p.x - startX, dy = p.y - startY; const ang = Math.atan2(dy,dx)*180/Math.PI;
    overlayCtx.font = '12px Arial'; overlayCtx.fillStyle = colorPicker.value;
    overlayCtx.fillText(`${Math.round(Math.hypot(dx,dy))} px • ${Math.round(ang)}°`, (startX+p.x)/2 + 6, (startY+p.y)/2 - 6);
    overlayCtx.restore();
    return;
  }

  if (currentTool === 'pencil'){
    const ctx = getActiveContext(); if (!ctx) return;
    ctx.strokeStyle=colorPicker.value; ctx.lineWidth=Math.max(1,parseInt(lineWidthInput.value||2));
    ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.stroke(); startX=x; startY=y; redrawAll(); return;
  }

  // Arc 'pleno' preview: arcTemp[0] holds center
  if (currentTool === 'arc'){
    const mode = document.getElementById('arcMode').value;
    if (mode === 'pleno' && arcTemp.length===1){
      const c = arcTemp[0]; const r = Math.hypot(x-c.cx, y-c.cy);
      drawPreviewArcOverlay(c.cx, c.cy, r, 0, Math.PI*2);
      return;
    }
  }
});

overlayCanvas.addEventListener('pointerup',(ev)=>{
  pointerDown=false; overlayCanvas.releasePointerCapture(ev.pointerId);
  const rect = overlayCanvas.getBoundingClientRect();
  const scale = currentZoom/100;
  const x = Math.round((ev.clientX - rect.left)/scale);
  const y = Math.round((ev.clientY - rect.top)/scale);

  // finalize selection handles transform
  if (selectionRect && (isResizing || isRotating)){
    isResizing=false; isRotating=false; activeHandle=null; pushUndo(); redrawAll(); showToast('Transformação aplicada'); return;
  }

  if (currentTool === 'selectRect'){
    // Set selection rect between start and up
    const sx = Math.min(startX,x), sy = Math.min(startY,y), sw = Math.abs(x-startX), sh = Math.abs(y-startY);
    if (sw<4||sh<4){ selectionRect=null; clearOverlay(); drawGrid(overlayCtx); showToast('Seleção cancelada'); return; }
    selectionRect = {x:Math.round(sx), y:Math.round(sy), w:Math.round(sw), h:Math.round(sh)};
    clearOverlay(); drawOverlaySelection(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h); showToast('Área selecionada'); return;
  }

  if (currentTool === 'line'){
    const p = snapOrthogonal(startX,startY,x,y,ev);
    const ctx = getActiveContext(); if (!ctx){ showToast('Selecione camada bitmap'); return; }
    ctx.strokeStyle=colorPicker.value; ctx.lineWidth=Math.max(1,parseInt(lineWidthInput.value||2));
    ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(p.x,p.y); ctx.stroke();
    pushUndo(); redrawAll(); showToast('Linha desenhada'); return;
  }

  if (currentTool === 'measure'){
    const p = snapOrthogonal(startX,startY,x,y,ev);
    const ctx = getActiveContext(); if (!ctx){ showToast('Selecione camada bitmap'); return; }
    drawMeasurement(ctx, startX,startY, p.x,p.y);
    pushUndo(); redrawAll(); showToast('Cota desenhada'); return;
  }

  if (currentTool === 'arc'){
    const mode = document.getElementById('arcMode').value;
    if (mode === 'pleno'){
      // arcTemp[0] was center, now (x,y) defines radius and maybe angle
      const c = arcTemp[0]; const r = Math.hypot(x-c.cx, y-c.cy);
      const act = getActiveContext();
      if (!act){ showToast('Selecione camada bitmap'); arcTemp=[]; return; }
      // draw full circle for simple pleno; user can limit later with measure
      act.beginPath(); act.arc(c.cx, c.cy, r, 0, Math.PI*2); act.strokeStyle=colorPicker.value; act.lineWidth=Math.max(1,parseInt(lineWidthInput.value||2)); act.stroke();
      pushUndo(); redrawAll(); arcTemp=[]; showToast('Arco pleno desenhado (círculo)'); return;
    }
    // mode 3pts was handled in pointerdown by collecting 3 clicks
  }

  if (currentTool === 'polyline'){
    // finishing on double click is handled by user; here no action on pointerup
    return;
  }

  // Paste
  if (pastePreview){
    finalizePasteAt(x,y); return;
  }

});

/* key handlers (Enter to finish polyline, Esc to cancel) */
window.addEventListener('keydown',(ev)=>{
  if (ev.key === 'Enter' && currentTool === 'polyline' && polylinePoints && polylinePoints.length >= 2){
    const ctx = getActiveContext(); if (!ctx) return;
    ctx.beginPath(); ctx.moveTo(polylinePoints[0].x, polylinePoints[0].y);
    for (let i=1;i<polylinePoints.length;i++) ctx.lineTo(polylinePoints[i].x, polylinePoints[i].y);
    ctx.strokeStyle=colorPicker.value; ctx.lineWidth=Math.max(1,parseInt(lineWidthInput.value||2)); ctx.stroke();
    pushUndo(); polylinePoints=null; redrawAll(); showToast('Polilinha finalizada'); return;
  }
  if (ev.key === 'Escape'){
    polylinePoints=null; arcTemp=[]; pastePreview=null; selectionRect=null; clearOverlay(); redrawAll(); showToast('Cancelado');
  }
});

/* helper: compute circle through 3 points */
function circleThrough3Points(A,B,C){
  const x1=A.x, y1=A.y, x2=B.x, y2=B.y, x3=C.x, y3=C.y;
  const a = x1 - x2, b = y1 - y2, c = x1 - x3, d = y1 - y3;
  const e = ((x1*x1 - x2*x2) + (y1*y1 - y2*y2))/2;
  const f = ((x1*x1 - x3*x3) + (y1*y1 - y3*y3))/2;
  const det = a*d - b*c;
  if (Math.abs(det) < 1e-6) return null;
  const cx = (d*e - b*f)/det;
  const cy = (-c*e + a*f)/det;
  const r = Math.hypot(x1 - cx, y1 - cy);
  return {cx, cy, r};
}

/* drawOverlaySelection used earlier; selection transform finalize handled */

/* blocks panel (dummy images 1..8) */
const blocksEl = document.getElementById('blocks');
for (let i=1;i<=8;i++){ const img=document.createElement('img'); img.src=i+'.png'; img.draggable=true; img.className='block'; img.title='bloco '+i; img.addEventListener('dragstart',(e)=>e.dataTransfer.setData('text/plain', i+'.png')); img.addEventListener('error', ()=>{ img.style.opacity=0.2; }); blocksEl.appendChild(img); }
overlayCanvas.addEventListener('dragover', e=> e.preventDefault());
overlayCanvas.addEventListener('drop', e=>{ e.preventDefault(); const name = e.dataTransfer.getData('text/plain'); const rect = overlayCanvas.getBoundingClientRect(); const scale = currentZoom/100; const x = Math.round((e.clientX - rect.left)/scale), y = Math.round((e.clientY - rect.top)/scale); insertBlock(name,x,y); });
function insertBlock(filename,x,y){ const img = new Image(); img.onload=()=>{ const w = Math.min(img.width,150), h = img.height*(w/img.width); const obj = {id:Date.now(), img:img, x:Math.round(x - w/2), y:Math.round(y - h/2), w:Math.round(w), h:Math.round(h), rot:0, mirror:false}; objects.push(obj); redrawAll(); pushUndo(); showToast('Bloco inserido');}; img.onerror=()=>showToast('erro ao carregar bloco'); img.src = filename; }

/* export / canvas size */
function exportPNG(){ const data = displayCanvas.toDataURL('image/png'); const a = document.createElement('a'); a.href=data; a.download='export.png'; a.click(); showToast('PNG exportado'); }
function openCanvasSizeModal(){ document.getElementById('newWidthInput').value = displayCanvas.width; document.getElementById('newHeightInput').value = displayCanvas.height; document.getElementById('modalOverlay').style.display='block'; document.getElementById('newCanvasSizeModal').style.display='block'; }
function cancelNewCanvasSize(){ document.getElementById('modalOverlay').style.display='none'; document.getElementById('newCanvasSizeModal').style.display='none'; }
function commitNewCanvasSize(newW,newH,silent=false){ const w=newW||parseInt(document.getElementById('newWidthInput').value), h=newH||parseInt(document.getElementById('newHeightInput').value); if (isNaN(w)||isNaN(h)){ showToast('Dimensões inválidas'); return; } displayCanvas.width = w; displayCanvas.height = h; overlayCanvas.width = w; overlayCanvas.height = h; layers.forEach(l=>{ if (l.type==='bitmap'){ const old = l.canvas; const nc = document.createElement('canvas'); nc.width = w; nc.height = h; const nctx = nc.getContext('2d',{alpha:true}); nctx.drawImage(old,0,0); l.canvas = nc; l.ctx = nctx; } }); if (!silent){ document.getElementById('modalOverlay').style.display='none'; document.getElementById('newCanvasSizeModal').style.display='none'; } redrawAll(); pushUndo(); showToast('Canvas redimensionado'); }
function toggleGrid(){ isGridVisible = !isGridVisible; redrawAll(); }

/* merge */
function mergeToNewLayer(){
  const newCanvas = document.createElement('canvas'); newCanvas.width = displayCanvas.width; newCanvas.height = displayCanvas.height;
  const nctx = newCanvas.getContext('2d',{alpha:true});
  layers.forEach(layer=>{ if (!layer.isVisible) return; nctx.globalAlpha = (layer.opacity||100)/100; if (layer.type==='bitmap') nctx.drawImage(layer.canvas,0,0); else if (layer.type==='object') layer.objects.forEach(o=> drawObject(nctx,o)); }); nctx.globalAlpha =1;
  layers = layers.filter(l=> l.type==='object');
  layers.push({id:Date.now(), name:'Layer Mesclada', type:'bitmap', canvas:newCanvas, ctx:nctx, isVisible:true, opacity:100});
  activeLayerId = layers[layers.length-1].id; updateLayersListUI(); pushUndo(); redrawAll(); showToast('Camadas mescladas');
}

/* clear canvas */
function clearCanvas(){ const ctx = getActiveContext(); if (!ctx) return; ctx.clearRect(0,0,displayCanvas.width, displayCanvas.height); pushUndo(); redrawAll(); showToast('Canvas limpo'); }

/* init state push */
pushUndo();
