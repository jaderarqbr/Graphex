
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montador de Tabuleiro Xianqi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Montador de Tabuleiro Xianqi</h1>

    <div id="board-container">
        <div id="board">
            </div>
    </div>

    <div id="controls-container">
        <div id="piece-selector">
            <h2>Peças para Montagem</h2>
            <div id="pieces-list">
                </div>
            <p>Arraste as peças selecionadas para o tabuleiro.</p>
        </div>

        <div id="remove-area">
            <h2>Remover Peça</h2>
            <div class="drop-target-area">
                Arraste peças do tabuleiro para cá para removê-las.
            </div>
        </div>
    </div>
    
    <button id="reset-button">Limpar Tabuleiro</button>

    <script src="script.js"></script>
</body>
</html>
