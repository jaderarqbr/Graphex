<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG System Hub</title>

    <style>
        :root {
            --color-bg-dark: #0f172a;
            --color-bg-card: #1e293b;
            --color-text-light: #f8fafc;
            --color-highlight: #818cf8;
            --color-secondary: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            padding: 20px;
        }

        #app {
            max-width: 1280px;
            margin: auto;
        }

        .container-box {
            background-color: var(--color-bg-card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.2);
            margin-bottom: 32px;
        }

        .dice-button {
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f172a;
        }
        .dice-button:active { transform: translateY(2px); box-shadow: none; }

        .d6 { background:#16a34a }
        .d10 { background:#ca8a04 }
        .d20 { background:#dc2626 }
        .d40 { background:#9333ea }
        .d4 { background:#16a34a }
        .btn-draw { background:#4f46e5 }

        #dice-container {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 16px;
        }

        #dice-result {
            margin-top:16px;
            font-size:24px;
            text-align:center;
            color:#4ade80;
        }

        #current-card {
            width: 100%;
            height: 256px;
            border: 4px dashed var(--color-highlight);
            border-radius: 8px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            background:#334155;
        }

        .card-draggable {
            cursor: grab;
            width: 128px;
            height: 192px;
            border-radius: 8px;
            border:4px solid #facc15;
            box-shadow:0 8px 12px rgba(0,0,0,.5);
        }

        #panels-container {
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:24px;
        }

        .panel {
            background:#334155;
            padding:16px;
            border-radius:12px;
            border:1px solid rgba(129,140,248,.5);
        }

        .drop-zone {
            width:100%;
            height:128px;
            border:2px dashed var(--color-secondary);
            display:flex;
            justify-content:center;
            align-items:center;
            background:rgba(51,65,85,.5);
            margin-bottom:8px;
        }

        .drop-zone img {
            width:96px;
            height:112px;
            border-radius:6px;
        }

        .stat-control {
            display:flex;
            justify-content:space-between;
            margin:4px 0;
        }

        .stat-buttons button {
            width:32px;
            height:32px;
            border-radius:50%;
            font-weight:700;
            border:none;
            cursor:pointer;
        }

        .minus { background:#ef4444; color:white; }
        .plus { background:#22c55e; color:white; }

        .stat-value {
            width:40px;
            text-align:center;
            font-size:20px;
            font-family:monospace;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1 style="text-align:center;color:var(--color-highlight);font-size:32px;font-weight:700;">RPG System Hub</h1>

        <!-- Dados -->
        <div class="container-box">
            <h2 class="text-xl mb-4 text-center">Dados de RPG</h2>
            <div id="dice-container">
                <button onclick="rollDice(6)" class="dice-button d6">Rolar d6</button>
                <button onclick="rollDice(10)" class="dice-button d10">Rolar d10</button>
                <button onclick="rollDice(20)" class="dice-button d20">Rolar d20</button>
                <button onclick="rollDice(40)" class="dice-button d40">Rolar d40</button>
<button onclick="rollDice(4)" class="dice-button d4">Rolar d4</button>
            </div>
            <p id="dice-result">Resultado: -</p>
        </div>

        <!-- Carta Sorteada -->
        <div class="container-box">
            <h2 class="text-xl mb-4 text-center">Carta Sorteada</h2>
            <div id="current-card">Clique em Sortear Carta</div>
            <button onclick="drawCard()" class="dice-button btn-draw" style="width:100%;margin-top:12px;">
                Sortear Carta (1-20.jpg)
            </button>
        </div>

        <!-- Painéis -->
        <div id="panels-container"></div>
    </div>

<script>
/* =========================
   ESTADO DOS PERSONAGENS
========================= */
let characterPanels = {
    panel0: { nivel:1, forca:1, velocidade:1, defesa:1, cardId:null },
    panel1: { nivel:1, forca:1, velocidade:1, defesa:1, cardId:null },
    panel2: { nivel:1, forca:1, velocidade:1, defesa:1, cardId:null },
    panel3: { nivel:1, forca:1, velocidade:1, defesa:1, cardId:null }
};

const cardHolder = document.getElementById("current-card");
const panelsContainer = document.getElementById("panels-container");
const CARD_BASE_PATH = "./";

/* =========================
        DADOS
========================= */
function rollDice(sides){
    let r = Math.floor(Math.random()*sides)+1;
    document.getElementById("dice-result").innerText = `Resultado: d${sides} = ${r}`;
}

/* =========================
      CRIAÇÃO PAINÉIS
========================= */
function createPanels(){
    panelsContainer.innerHTML = "";
    Object.keys(characterPanels).forEach((key,i)=>{
        let p = document.createElement("div");
        p.className="panel";
        p.id=key;

        p.innerHTML = `
            <h3 style="font-weight:700;font-size:18px;margin-bottom:8px;color:#a5b4fc;">Painel ${i+1}</h3>
            <div id="zone-${i}" class="drop-zone">Arraste a Carta Aqui</div>
            ${renderStats(key)}
        `;

        panelsContainer.appendChild(p);

        let zone = document.getElementById(`zone-${i}`);
        zone.addEventListener("dragover", e=>e.preventDefault());
        zone.addEventListener("drop", e => {
            let cid = e.dataTransfer.getData("text");
            applyCardToPanel(key, cid);
        });
    });
}

function renderStats(panel){
    return ["nivel","forca","velocidade","defesa"].map(stat=>`
        <div class="stat-control">
            <span>${stat}:</span>
            <div class="stat-buttons">
                <button class="minus" onclick="adjustStat('${panel}','${stat}',-1)">-</button>
                <span class="stat-value" id="${panel}-${stat}">${characterPanels[panel][stat]}</span>
                <button class="plus" onclick="adjustStat('${panel}','${stat}',1)">+</button>
            </div>
        </div>
    `).join("") + `
        <p style="font-size:12px;margin-top:6px;text-align:right;">
            Card: <span id="${panel}-card-id">${characterPanels[panel].cardId ?? "Nenhum"}</span>
        </p>
    `;
}

function adjustStat(panel, stat, val){
    characterPanels[panel][stat] = Math.max(1, characterPanels[panel][stat] + val);
    document.getElementById(`${panel}-${stat}`).innerText = characterPanels[panel][stat];
}

/* =========================
        SORTEAR CARTA
========================= */
function drawCard(){
    let id = Math.floor(Math.random()*20)+1;
    let src = `${CARD_BASE_PATH}${id}.jpg`;

    cardHolder.innerHTML = `
        <img src="${src}" draggable="true" data-id="${id}" 
             class="card-draggable"
             ondragstart="event.dataTransfer.setData('text', '${id}')">
    `;
}

/* =========================
      APLICAR CARTA
========================= */
function applyCardToPanel(panel, cardId){
    characterPanels[panel].cardId = cardId;
    document.getElementById(`${panel}-card-id`).innerText = cardId;

    let index = panel.replace("panel","");
    let zone = document.getElementById(`zone-${index}`);
    zone.innerHTML = `<img src="${CARD_BASE_PATH}${cardId}.jpg">`;

    cardHolder.innerHTML = "Carta em uso. Sorteie outra.";
}

/* =========================
      INICIALIZAÇÃO
========================= */
window.onload = createPanels;
</script>
</body>
</html>
